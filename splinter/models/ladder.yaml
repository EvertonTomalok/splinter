# Execution ladder. Each tier is a fixed model + reasoning variant; the loop climbs
# the tiers on escalation. deepseek-v4-pro is the workhorse (3 tiers, climbing its
# reasoning: medium → high → max) before switching models, so most usage stays on
# it. qwen3.7-max (xhigh) sits above it; sonnet is the LAST RESORT — avoid running
# it unless everything below was exhausted.
tiers:
  - name: easy
    level: 0
    # real-easy tasks: deepseek-pro at medium reasoning
    models:
      - opencode-go/deepseek-v4-pro
    variant: medium

  - name: moderate
    level: 1
    # the workhorse — most runs live here (deepseek-pro, high reasoning)
    models:
      - opencode-go/deepseek-v4-pro
    variant: high

  - name: moderate-hard
    level: 2
    # still deepseek-pro, maxed reasoning, before paying for a different model
    models:
      - opencode-go/deepseek-v4-pro
    variant: max

  - name: hard
    level: 3
    # switch model: qwen3.7-max at xhigh
    models:
      - opencode-go/qwen3.7-max
    variant: xhigh

  - name: critical
    level: 4
    # Frontier claude at high. Avoid running unless the cheaper ladder is exhausted.
    provider: claude
    models:
      - sonnet
    variant: high

  - name: last-resort
    level: 5
    # The very last rung: sonnet maxed out. Only reached if `critical` still failed.
    provider: claude
    models:
      - sonnet
    variant: max

# Task difficulty → starting tier. Escalation walks up from there; the per-tier
# `variant` above sets the reasoning level at each rung.
effort_map:
  trivial:
    start_tier: 0
    variant: medium
  normal:
    start_tier: 1   # workhorse: deepseek-v4-pro @ high
    variant: high
  hard:
    start_tier: 3   # qwen3.7-max @ xhigh
    variant: xhigh
  critical:
    start_tier: 4   # sonnet — last resort
    variant: high

eval:
  default_model: sonnet
  default_effort: high

planner:
  model: sonnet
  effort: high

localizer:
  # recall/search: cheap, big-context capable
  recall_model: opencode-go/deepseek-v4-flash
  recall_model_large: opencode-go/minimax-m3   # huge context window for large repos
  # qualify/filter locations
  precision_model: opencode-go/kimi-k2.6
